<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Redistribution Dynamics</title>
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.1/socket.io.js"></script>
    <script type="text/javascript" src="./assetmanager.js"></script>
    <script type="text/javascript" src="./timer.js"></script>
    <script type="text/javascript" src="./gameengine.js"></script>
    <script type="text/javascript" src="./util.js"></script>
    <script type="text/javascript" src="./parameters.js"></script>
    <script type="text/javascript" src="./graph.js"></script>
    <script type="text/javascript" src="./histogram.js"></script>
    <script type="text/javascript" src="./datamanager.js"></script>
    <script type="text/javascript" src="./observer.js"></script>
    <script type="text/javascript" src="./agent.js"></script>
    <script type="text/javascript" src="./village.js"></script>
    <script type="text/javascript" src="./population.js"></script>
    <script type="text/javascript" src="./world.js"></script>
    <script type="text/javascript" src="./runs.js"></script>
    <script type="text/javascript" src="./main.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="mainLayout">
        <canvas id="gameWorld" width="2000" height="1000" style="background: white; border: 1px solid black"
            tabindex="0" autofocus></canvas>
        <div id="ui">
            <div id="db" class="db-status">Database</div><br />
            <div id="initial">
                <label for="numAgents">Number of Agents:</label>
                <input type="number" id="numAgents" value="100" min="1" max="10000"><br>

                <label for="initialStock">Initial Stock per Agent:</label>
                <input type="number" id="initialStock" value="10" min="0" max="1000"><br>
            </div>
            <div id="parameters">
                <div id="runName">Run From Controls</div>

                <label for="regime">Redistribution Regime:</label>
                <select id="regime">
                    <option value="none">none — keep your own</option>
                    <option value="share">share — hungry take from richest</option>
                    <option value="theft">theft — hungry seize from random (may be lost)</option>
                    <option value="pool">pool — split equally each tick</option>
                    <option value="genome">genome — policy from the social genes</option>
                </select><br><br>

                <label for="conflictChance">Conflict loss chance (theft only):</label>
                <input type="number" id="conflictChance" value="0.25" step="0.01" min="0" max="1"><br>

                <fieldset>
                    <legend>Social genome (regime = genome)</legend>
                    <label for="tau">&tau; collection rate:</label>
                    <input type="number" id="tau" value="0.5" step="0.05" min="0" max="1"><br>
                    <label for="theta">&theta; progressivity (frac of richest exempt):</label>
                    <input type="number" id="theta" value="0.5" step="0.05" min="0" max="1"><br>
                    <label for="phi">&phi; focus (equal 0 &rarr; neediest 1):</label>
                    <input type="number" id="phi" value="1.0" step="0.05" min="0" max="1"><br>
                    <label for="kappa">&kappa; hub retention:</label>
                    <input type="number" id="kappa" value="0.0" step="0.05" min="0" max="1"><br>
                    <label for="lambda">&lambda; punishment (destroy defector due):</label>
                    <input type="number" id="lambda" value="0.0" step="0.05" min="0" max="1"><br>
                    <label for="coop">coop (compliance):</label>
                    <input type="number" id="coop" value="1.0" step="0.05" min="0" max="1"><br>
                </fieldset>

                <fieldset>
                    <legend>Model V — villages (grid group selection)</legend>
                    <label for="spatial">Spatial: run the village grid</label>
                    <input type="checkbox" id="spatial"><br>
                    <label for="cap">Village cap:</label>
                    <input type="number" id="cap" value="100" min="2" max="1000" step="1"><br>
                    <label for="birthThreshold">Birth threshold (needs-met points):</label>
                    <input type="number" id="birthThreshold" value="50" min="1" max="10000" step="1"><br>
                    <label for="starveDeathChance">Starve death chance:</label>
                    <input type="number" id="starveDeathChance" value="0.1" step="0.01" min="0" max="1"><br>
                    <label for="fissionSize">Fission size (frac that leaves):</label>
                    <input type="number" id="fissionSize" value="0.5" step="0.05" min="0" max="1"><br>
                    <label for="fissionMaxFraction">Fission target max fullness:</label>
                    <input type="number" id="fissionMaxFraction" value="0.5" step="0.05" min="0" max="1"><br>
                    <label for="pMigrateRandom">Migrate: random:</label>
                    <input type="number" id="pMigrateRandom" value="0.0" step="0.005" min="0" max="1"><br>
                    <label for="pMigrateMisfit">Migrate: policy misfit:</label>
                    <input type="number" id="pMigrateMisfit" value="0.0" step="0.005" min="0" max="1"><br>
                    <label for="pMigrateStarve">Migrate: starving:</label>
                    <input type="number" id="pMigrateStarve" value="0.0" step="0.005" min="0" max="1"><br>
                </fieldset>

                <label for="pNoGather">Chance to fail gathering (bane):</label>
                <input type="number" id="pNoGather" value="0.1" step="0.01" min="0" max="1"><br>

                <label for="pNoConsume">Chance to skip consuming (boon):</label>
                <input type="number" id="pNoConsume" value="0.1" step="0.01" min="0" max="1"><br>

                <label for="evolveTraits">Evolve traits (starve = death + mutated heir):</label>
                <input type="checkbox" id="evolveTraits"><br>

                <label for="mutationStdev">Mutation std dev:</label>
                <input type="number" id="mutationStdev" value="0.02" step="0.005" min="0" max="1"><br>

                <label for="deathChance">Random death chance per tick:</label>
                <input type="number" id="deathChance" value="0.001" step="0.001" min="0" max="1"><br>

                <label for="coupleTraits">Couple traits (one gene, no divergence):</label>
                <input type="checkbox" id="coupleTraits"><br>

                <label for="epoch">Epoch (ticks per run):</label>
                <input type="number" id="epoch" value="10000" min="100" max="1000000" step="100"><br>
            </div>
            <div id="controls">
                <button id="resetButton">Reset</button><br>
                <button id="runExperimentButton">Start Experiment</button>
                <button id="nextRunButton">Next Run</button>
            </div>
        </div>
    </div>
</body>

</html>
