<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Redistribution Dynamics</title>
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.1/socket.io.js"></script>
    <script type="text/javascript" src="./assetmanager.js"></script>
    <script type="text/javascript" src="./timer.js"></script>
    <script type="text/javascript" src="./gameengine.js"></script>
    <script type="text/javascript" src="./util.js"></script>
    <script type="text/javascript" src="./parameters.js"></script>
    <script type="text/javascript" src="./graph.js"></script>
    <script type="text/javascript" src="./histogram.js"></script>
    <script type="text/javascript" src="./datamanager.js"></script>
    <script type="text/javascript" src="./observer.js"></script>
    <script type="text/javascript" src="./agent.js"></script>
    <script type="text/javascript" src="./village.js"></script>
    <script type="text/javascript" src="./population.js"></script>
    <script type="text/javascript" src="./world.js"></script>
    <script type="text/javascript" src="./runs.js"></script>
    <script type="text/javascript" src="./main.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="mainLayout">
        <canvas id="gameWorld" width="2000" height="1300" style="background: white; border: 1px solid black"
            tabindex="0" autofocus></canvas>
        <div id="ui">
            <div id="db" class="db-status">Database</div>

            <div id="tabs">
                <button type="button" id="tabSpatial" class="tab active">Villages (Model V)</button>
                <button type="button" id="tabSingle" class="tab">Single population</button>
            </div>
            <!-- driven by the tabs; read by loadParametersFromUI -->
            <input type="checkbox" id="spatial" style="display:none">

            <div id="runName">Run From Controls</div>

            <!-- ===== SPATIAL (Model V) ===== -->
            <div id="panelSpatial" class="panel">
                <fieldset>
                    <legend>Grid &amp; villages</legend>
                    <label for="gridSize">Grid size (NxN):</label>
                    <input type="number" id="gridSize" value="10" min="1" max="50" step="1"><br>
                    <label for="cap">Village cap:</label>
                    <input type="number" id="cap" value="100" min="2" max="1000" step="1"><br>
                    <label for="birthThreshold">Birth threshold (base, needs-met points):</label>
                    <input type="number" id="birthThreshold" value="0" min="0" max="10000" step="1"><br>
                    <label for="birthThresholdRate">&nbsp;&nbsp;+ per-villager rate (x pop):</label>
                    <input type="number" id="birthThresholdRate" value="4" step="0.1" min="0" max="100"><br>
                    <label for="wealthProportionalBirth">Group parent &prop; wealth:</label>
                    <input type="checkbox" id="wealthProportionalBirth"><br>
                    <label for="individualBirthThreshold">Individual birth threshold (0=off):</label>
                    <input type="number" id="individualBirthThreshold" value="0" min="0" max="10000" step="1"><br>
                    <label for="starveDeathChance">Starve death chance:</label>
                    <input type="number" id="starveDeathChance" value="0.1" step="0.01" min="0" max="1"><br>
                    <label for="catastropheChance">Catastrophe chance (&times; populated neighbors):</label>
                    <input type="number" id="catastropheChance" value="0.001" step="0.001" min="0" max="1"><br>
                    <label for="fissionSize">Fission size (frac that leaves):</label>
                    <input type="number" id="fissionSize" value="0.5" step="0.05" min="0" max="1"><br>
                    <label for="fissionMaxFraction">Fission target max fullness:</label>
                    <input type="number" id="fissionMaxFraction" value="0.5" step="0.05" min="0" max="1"><br>
                    <label for="randomizeGenes">Random founder genes:</label>
                    <input type="checkbox" id="randomizeGenes" checked><br>
                    <label for="cloneFounders">Villagers clone founder:</label>
                    <input type="checkbox" id="cloneFounders"><br>
                </fieldset>
                <fieldset>
                    <legend>Migration vectors</legend>
                    <label for="pMigrateRandom">random:</label>
                    <input type="number" id="pMigrateRandom" value="0.01" step="0.005" min="0" max="1"><br>
                    <label for="pMigrateMisfit">policy misfit (Tiebout):</label>
                    <input type="number" id="pMigrateMisfit" value="0.25" step="0.005" min="0" max="1"><br>
                    <label for="pMigrateStarve">starving (seek food):</label>
                    <input type="number" id="pMigrateStarve" value="0.20" step="0.005" min="0" max="1"><br>
                    <label for="displayMode">Cell display:</label>
                    <select id="displayMode">
                        <option value="policy">policy (gene colour)</option>
                        <option value="villagers">villagers (wealth)</option>
                    </select><br>
                    <label for="wealthLevels">Wealth colour levels:</label>
                    <input type="number" id="wealthLevels" value="10" min="2" max="50" step="1"><br>
                    <label for="gridColorGene">Colour grid by:</label>
                    <select id="gridColorGene">
                        <option value="tau">&tau; tax rate</option>
                        <option value="theta">&theta; who pays</option>
                        <option value="phi">&phi; who receives</option>
                        <option value="kappa">&kappa; chief's cut</option>
                        <option value="lambda">&lambda; punish</option>
                        <option value="coop">coop comply</option>
                    </select><br>
                </fieldset>
            </div>

            <!-- ===== SINGLE POPULATION ===== -->
            <div id="panelSingle" class="panel" style="display:none">
                <fieldset>
                    <legend>Population</legend>
                    <label for="numAgents">Number of agents:</label>
                    <input type="number" id="numAgents" value="100" min="1" max="10000"><br>
                </fieldset>
                <fieldset>
                    <legend>Regime</legend>
                    <label for="regime">Redistribution regime:</label>
                    <select id="regime">
                        <option value="none">none — keep your own</option>
                        <option value="share">share — hungry take from richest</option>
                        <option value="theft">theft — hungry seize from random (may be lost)</option>
                        <option value="pool">pool — split equally each tick</option>
                        <option value="genome">genome — policy from the social genes</option>
                    </select><br>
                    <label for="conflictChance">Conflict loss chance (theft only):</label>
                    <input type="number" id="conflictChance" value="0.25" step="0.01" min="0" max="1"><br>
                </fieldset>
                <fieldset>
                    <legend>Trait evolution (legacy)</legend>
                    <label for="evolveTraits">Evolve traits (starve = death + mutated heir):</label>
                    <input type="checkbox" id="evolveTraits"><br>
                    <label for="coupleTraits">Couple traits (one gene, no divergence):</label>
                    <input type="checkbox" id="coupleTraits"><br>
                </fieldset>
            </div>

            <!-- ===== SHARED ===== -->
            <div id="panelCommon">
                <fieldset>
                    <legend>Genome policy (genes)</legend>
                    <label for="tau">&tau; collection rate:</label>
                    <input type="number" id="tau" value="0.5" step="0.05" min="0" max="1"><br>
                    <label for="theta">&theta; progressivity (frac of richest exempt):</label>
                    <input type="number" id="theta" value="0.5" step="0.05" min="0" max="1"><br>
                    <label for="phi">&phi; focus (equal 0 &rarr; neediest 1):</label>
                    <input type="number" id="phi" value="1.0" step="0.05" min="0" max="1"><br>
                    <label for="kappa">&kappa; hub retention:</label>
                    <input type="number" id="kappa" value="0.0" step="0.05" min="0" max="1"><br>
                    <label for="lambda">&lambda; punishment (destroy defector due):</label>
                    <input type="number" id="lambda" value="0.0" step="0.05" min="0" max="1"><br>
                    <label for="coop">coop (compliance):</label>
                    <input type="number" id="coop" value="1.0" step="0.05" min="0" max="1"><br>
                </fieldset>
                <fieldset>
                    <legend>Environment &amp; evolution</legend>
                    <label for="initialStock">Initial stock per agent:</label>
                    <input type="number" id="initialStock" value="0" min="0" max="1000"><br>
                    <label for="pNoGather">Chance to fail gathering (bane):</label>
                    <input type="number" id="pNoGather" value="0.2" step="0.01" min="0" max="1"><br>
                    <label for="pNoConsume">Chance to skip consuming (boon):</label>
                    <input type="number" id="pNoConsume" value="0.2" step="0.01" min="0" max="1"><br>
                    <label for="mutationStdev">Mutation std dev:</label>
                    <input type="number" id="mutationStdev" value="0.02" step="0.005" min="0" max="1"><br>
                    <label for="deathChance">Random death chance per tick:</label>
                    <input type="number" id="deathChance" value="0.001" step="0.001" min="0" max="1"><br>
                    <label for="epoch">Epoch (ticks per run):</label>
                    <input type="number" id="epoch" value="100000" min="100" max="1000000" step="100"><br>
                    <label for="reportingPeriod">Data sample rate (ticks):</label>
                    <input type="number" id="reportingPeriod" value="100" min="1" max="100000" step="1"><br>
                    <label for="updatesPerDraw">Updates per draw (ticks):</label>
                    <input type="number" id="updatesPerDraw" value="1" min="1" max="10000" step="1"><br>
                </fieldset>
            </div>

            <div id="controls">
                <button id="resetButton">Reset</button><br>
                <button id="runExperimentButton">Start Experiment</button>
                <button id="nextRunButton">Next Run</button>
            </div>
        </div>
    </div>
</body>

</html>
